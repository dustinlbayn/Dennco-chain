data-path="/opt/besu/data"
genesis-file="/config/genesis.json"

# Network
network-id=20260616
sync-mode="FULL"

# P2P
p2p-host="0.0.0.0"
p2p-port=30303
max-peers=50

# Transaction node JSON-RPC boundary
rpc-http-enabled=true
rpc-http-host="0.0.0.0"
rpc-http-port=8545
rpc-http-api=["ETH","NET","WEB3","TXPOOL"]
rpc-http-cors-origins=["*"]
rpc-http-authentication-enabled=false

# Transaction node WebSocket boundary
rpc-ws-enabled=true
rpc-ws-host="0.0.0.0"
rpc-ws-port=8546
rpc-ws-api=["ETH","NET","WEB3"]

# This node relays transactions; it does not produce blocks.
miner-enabled=false
min-gas-price=0

# Local development security posture. Harden before production.
host-allowlist=["*"]
logging="INFO"
